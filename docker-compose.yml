services:
  db:
    image: postgres:16-alpine
    container_name: roznica-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: roznica
      POSTGRES_USER: roznica
      POSTGRES_PASSWORD: ${DB_PASSWORD:?required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No port mapping — DB accessible only within docker network (app → db:5432)
    # For local dev, uncomment: ports: ["5433:5432"]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: roznica-landing
    restart: unless-stopped
    ports:
      - "3004:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://roznica:${DB_PASSWORD:?required}@db:5432/roznica
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?required}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3004}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - YANDEX_CLIENT_ID=${YANDEX_CLIENT_ID:-}
      - YANDEX_CLIENT_SECRET=${YANDEX_CLIENT_SECRET:-}
      - VK_CLIENT_ID=${VK_CLIENT_ID:-}
      - VK_CLIENT_SECRET=${VK_CLIENT_SECRET:-}
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID:-}
      - YOOKASSA_SECRET_KEY=${YOOKASSA_SECRET_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-smtp.beget.com}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - CDEK_WEBHOOK_SECRET=${CDEK_WEBHOOK_SECRET:-}
      - TRACKING_POLL_SECRET=${TRACKING_POLL_SECRET:-}
      - AUTH_TRUST_HOST=${AUTH_TRUST_HOST:-true}
    depends_on:
      - db
    volumes:
      - uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  pgdata:
  uploads:
