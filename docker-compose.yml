services:
  db:
    image: postgres:16-alpine
    container_name: roznica-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: roznica
      POSTGRES_USER: roznica
      POSTGRES_PASSWORD: ${DB_PASSWORD:-roznica}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: roznica-landing
    restart: unless-stopped
    ports:
      - "3004:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://roznica:${DB_PASSWORD:-roznica}@db:5432/roznica
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3004}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - YANDEX_CLIENT_ID=${YANDEX_CLIENT_ID:-}
      - YANDEX_CLIENT_SECRET=${YANDEX_CLIENT_SECRET:-}
      - VK_CLIENT_ID=${VK_CLIENT_ID:-}
      - VK_CLIENT_SECRET=${VK_CLIENT_SECRET:-}
    depends_on:
      - db
    volumes:
      - uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  pgdata:
  uploads:
