services:
  db:
    image: postgres:16-alpine
    container_name: roznica-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: roznica
      POSTGRES_USER: roznica
      POSTGRES_PASSWORD: ${DB_PASSWORD:?required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    # No port mapping — DB accessible only within docker network (app → db:5432)
    # For local dev, uncomment: ports: ["5433:5432"]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: roznica-landing
    restart: unless-stopped
    ports:
      - "3004:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://roznica:${DB_PASSWORD:?required}@db:5432/roznica
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?required}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3004}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - YANDEX_CLIENT_ID=${YANDEX_CLIENT_ID:-}
      - YANDEX_CLIENT_SECRET=${YANDEX_CLIENT_SECRET:-}
      - VK_CLIENT_ID=${VK_CLIENT_ID:-}
      - VK_CLIENT_SECRET=${VK_CLIENT_SECRET:-}
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID:-}
      - YOOKASSA_SECRET_KEY=${YOOKASSA_SECRET_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-smtp.beget.com}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - CDEK_WEBHOOK_SECRET=${CDEK_WEBHOOK_SECRET:-}
      - TRACKING_POLL_SECRET=${TRACKING_POLL_SECRET:-}
      - AUTH_TRUST_HOST=${AUTH_TRUST_HOST:-true}
      - GOOGLE_SITE_VERIFICATION=${GOOGLE_SITE_VERIFICATION:-}
      - YANDEX_VERIFICATION=${YANDEX_VERIFICATION:-}
      - MILLORBOT_ENABLED=${MILLORBOT_ENABLED:-false}
      - MILLORBOT_URL=${MILLORBOT_URL:-}
      - MILLORBOT_SHARED_SECRET=${MILLORBOT_SHARED_SECRET:-}
      - ADMIN_NOTIFICATION_EMAILS=${ADMIN_NOTIFICATION_EMAILS:-newrefining@yandex.ru}
      - CRON_SECRET=${CRON_SECRET:-}
    depends_on:
      - db
    volumes:
      - uploads:/app/public/uploads
    networks:
      - internal
      - millor-backbone
    healthcheck:
      # Проверяем /api/health — он дёргает DB через Prisma,
      # а не просто TCP-порт. Если БД отвалилась, контейнер
      # перезапустится через restart policy.
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  outbox-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: roznica-outbox-worker
    restart: unless-stopped
    command: ["node", "scripts/outbox-worker.mjs"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://roznica:${DB_PASSWORD:?required}@db:5432/roznica
      - MILLORBOT_ENABLED=${MILLORBOT_ENABLED:-false}
      - MILLORBOT_URL=${MILLORBOT_URL:-}
      - MILLORBOT_SHARED_SECRET=${MILLORBOT_SHARED_SECRET:-}
      - OUTBOX_POLL_INTERVAL_MS=${OUTBOX_POLL_INTERVAL_MS:-5000}
      - OUTBOX_MAX_ATTEMPTS=${OUTBOX_MAX_ATTEMPTS:-10}
      - APP_INTERNAL_URL=http://app:3000
      - CRON_SECRET=${CRON_SECRET:-}
      - EMAIL_TICK_EVERY_MS=${EMAIL_TICK_EVERY_MS:-30000}
    depends_on:
      - db
    networks:
      - internal
      - millor-backbone

networks:
  internal:
    driver: bridge
  millor-backbone:
    external: true
    name: millor-backbone

volumes:
  pgdata:
  uploads:
